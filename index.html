<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SpeedyPeng</title>
  <link rel="stylesheet" href="style.css?v=20260423" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">

    <!-- ── Room Background ── -->
    <div id="bg-room"></div>

    <!-- ── Top Bar ── -->
    <div id="top-bar">
      <div id="bond-pill">
        <img src="assets/ui/icon_bond.png" class="pill-img" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span class="pill-emoji" style="display:none">❤</span>
        <div id="bond-pill-right">
          <span id="bond-val">Lv.1</span>
          <div class="bond-exp-bar-wrap">
            <div class="bond-exp-bar-fill" id="bond-exp-bar-fill"></div>
            <span class="bond-exp-bar-text" id="bond-exp-info"></span>
          </div>
        </div>
      </div>
      <div id="top-actions">
        <div id="coin-display">
          <img src="assets/ui/icon_coin.png" class="pill-img" alt=""
               onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <span class="pill-emoji" style="display:none">🪙</span>
          <span id="coin-val">0</span>
        </div>
      </div>
    </div>

    <!-- ── Stat Mini Bar ── -->
    <div id="stat-mini-bar">
      <span class="mini-stat">
        <img src="assets/ui/stat_hunger.png" class="stat-icon-img" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span class="stat-emoji" style="display:none">🍚</span>
        <span id="mini-hunger-val">0</span>
      </span>
      <span class="mini-stat">
        <img src="assets/ui/stat_energy.png" class="stat-icon-img" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span class="stat-emoji" style="display:none">⚡</span>
        <span id="mini-energy-val">0</span>
      </span>
      <span class="mini-stat" style="position:relative">
        <img src="assets/ui/stat_mood.png" class="stat-icon-img" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span class="stat-emoji" style="display:none">🩷</span>
        <span id="mini-mood-val">0</span>
        <span id="mood-regen-tip" class="mood-regen-tip hidden"></span>
      </span>
    </div>

    <!-- ── Left Sidebar ── -->
    <div id="left-sidebar">
      <div class="side-item" onclick="openPanel('diary')">
        <div class="side-icon-wrap">
          <img src="assets/ui/sidebar_diary.png" class="side-img" alt=""
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="side-emoji" style="display:none">📔</span>
        </div>
        <div class="side-label">小猪日记</div>
      </div>
      <div class="side-item" onclick="openPanel('tasks')">
        <div class="side-icon-wrap">
          <img src="assets/ui/sidebar_tasks.png" class="side-img" alt=""
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="side-emoji" style="display:none">✅</span>
        </div>
        <div class="side-label">每日任务</div>
      </div>
    </div>

    <!-- ── Character Stage ── -->
    <div id="char-stage">
      <!-- Context label (like 打扮一下吧) -->
      <div id="context-label"></div>

      <!-- Character sprite wrapper (handles image fallback gracefully) -->
      <div id="char-sprite-wrap">
        <!-- Layer 1 (bottom): full-body expression image, changes per mood/state -->
        <img id="char-sprite"
             src="assets/characters/char_normal.png"
             alt=""
             onclick="interact()" />
        <!-- Layer 2 (top): headless clothing overlay, same dimensions, hidden when no outfit worn -->
        <img id="char-outfit-overlay" src="" alt="" />
        <div id="char-fallback" class="hidden" onclick="interact()">🐧</div>
      </div>

<!-- Ground shadow -->
      <div id="char-shadow"></div>
    </div>

    <!-- ── Outing Overlay (shown while character is out) ── -->
    <div id="outing-overlay" class="hidden">
      <div id="outing-countdown"></div>
    </div>

    <!-- ── Bottom Nav Plank ── -->
    <nav id="bottom-nav">
      <div id="nav-plank">
        <button class="nav-btn" id="nav-feed" onclick="openPanel('feed')">
          <div class="nav-icon-bg">
            <img src="assets/ui/nav_feed.png" class="nav-img" alt=""
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="nav-emoji" style="display:none">🍽</span>
          </div>
          <span class="nav-label">喂食</span>
        </button>

        <button class="nav-btn" id="nav-outing" onclick="handleOutingClick()">
          <div class="nav-icon-bg">
            <img src="assets/ui/nav_outing.png" class="nav-img" alt=""
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="nav-emoji" style="display:none">🚪</span>
          </div>
          <span class="nav-label">外出</span>
        </button>

        <button class="nav-btn" id="nav-work" onclick="handleWorkClick()">
          <div class="work-progress-ring" id="work-progress-ring">
            <div class="nav-icon-bg">
              <span class="nav-emoji" style="display:flex">💼</span>
            </div>
          </div>
          <span class="nav-label">打工</span>
        </button>

        <button class="nav-btn" id="nav-outfit" onclick="openPanel('outfit')">
          <div class="nav-icon-bg">
            <img src="assets/ui/nav_outfit.png" class="nav-img" alt=""
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="nav-emoji" style="display:none">👗</span>
          </div>
          <span class="nav-label">装扮</span>
        </button>
      </div>
    </nav>

    <!-- ═══ PANELS ═══ -->

    <!-- Feed Panel -->
    <div id="panel-feed" class="panel-overlay hidden">
      <div class="panel-card">
        <div class="panel-header">
          <span>🍽️ 投喂</span>
          <button class="close-btn" onclick="closePanel()">✕</button>
        </div>
        <div id="food-grid"></div>
      </div>
    </div>

    <!-- Outfit Panel -->
    <div id="panel-outfit" class="panel-overlay hidden">
      <div class="panel-card">
        <div class="panel-header">
          <span>👗 换装</span>
          <button class="close-btn" onclick="closePanel()">✕</button>
        </div>
        <div id="outfit-grid"></div>
      </div>
    </div>

    <!-- Memory / Album Panel -->
    <div id="panel-memory" class="panel-overlay hidden">
      <div class="panel-card">
        <div class="panel-header">
          <span>📷 相册</span>
          <button class="close-btn" onclick="closePanel()">✕</button>
        </div>
        <div id="memory-list"></div>
      </div>
    </div>

    <!-- Diary Panel -->
    <div id="panel-diary" class="panel-overlay hidden">
      <div class="panel-card">
        <div class="panel-header">
          <span>📔 小猪日记</span>
          <button class="close-btn" onclick="closePanel()">✕</button>
        </div>
        <div id="diary-content"></div>
      </div>
    </div>

    <!-- Tasks Panel -->
    <div id="panel-tasks" class="panel-overlay hidden">
      <div class="panel-card">
        <div class="panel-header">
          <span>✅ 每日任务</span>
          <button class="close-btn" onclick="closePanel()">✕</button>
        </div>
        <div id="tasks-list"></div>
      </div>
    </div>

    <!-- ═══ POPUPS ═══ -->

    <!-- Outing Return Modal -->
    <div id="outing-return-modal" class="popup-overlay hidden">
      <div class="popup-card">
        <div class="return-modal-title" id="return-modal-title">📔 外出归来</div>
        <div id="return-event-area" class="return-event-area"></div>
        <div id="return-reward-area" class="return-reward-area hidden"></div>
        <button class="popup-confirm-btn" id="return-close-btn" onclick="closeReturnModal()">收下啦 ✓</button>
      </div>
    </div>

    <!-- Outing Result Popup -->
    <div id="popup-outing" class="popup-overlay hidden">
      <div class="popup-card">
        <div id="popup-emoji" class="popup-emoji">🚪</div>
        <div id="popup-title" class="popup-title"></div>
        <div id="popup-text"  class="popup-text"></div>
        <div id="popup-rewards" class="popup-rewards"></div>
        <button class="popup-confirm-btn" onclick="closePopup()">好的～</button>
      </div>
    </div>

    <!-- Diary Detail Modal -->
    <div id="diary-detail-modal" class="popup-overlay hidden" onclick="closeDiaryDetail()">
      <div class="popup-card diary-detail-card" onclick="event.stopPropagation()">
        <img id="diary-detail-img" src="" alt="" class="diary-detail-img" />
        <div id="diary-detail-date" class="mem-date diary-detail-date"></div>
        <div id="diary-detail-text" class="diary-handwriting diary-detail-text"></div>
        <button class="popup-confirm-btn" onclick="closeDiaryDetail()">收起 ✕</button>
      </div>
    </div>

    <!-- Backdrop -->
    <div id="backdrop" class="hidden" onclick="closePanel()"></div>

    <!-- Toast -->
    <div id="toast"></div>

  </div>
  <script src="outfits.js?v=20260423"></script>
  <script src="game.js?v=20260423"></script>
</body>
</html>
